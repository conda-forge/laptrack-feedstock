{% set name = "laptrack" %}
{% set version = "0.16.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/laptrack-{{ version }}.tar.gz
  sha256: a35be5833ad798ef5577ac0b77267df5c4db02be4ce1f7b15c6bf9c93b18f96f

build:
  entry_points:
    - laptrack = laptrack.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - hatchling >=1.26.0
    - python >=3.10,<3.15
  run:
    - click >=8.0.1
    - python >=3.10,<3.15
    - networkx >=3.4.2
    - numpy >=1.26,<3.0.0
    - pandas >=1.3.1,<4.0.0
    - pooch >=1.6.0
    - pydantic >=2.0,<3.0.0
    - scikit-image >=0.24.0,<1.0.0
    - scikit-learn >=1.5.0
    - scipy >=1.14.1,!=1.15.*,<2.0.0
    - typing-extensions >=4.1.0,<5.0.0

test:
  imports:
    - laptrack
  commands:
    - pip list
    - pip check
    - laptrack --help
  requires:
    - pip

about:
  home: https://github.com/yfukai/laptrack
  summary: |
    Provides a robust particle tracking algorithm using the Linear
    Assignment Problem, with various cost functions for linking.
  license: BSD-3-Clause
  license_file: LICENSE.rst

extra:
  recipe-maintainers:
    - goanpeca
    - yfukai
